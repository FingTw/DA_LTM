<div class="container">
  <div class="header">
    <h1>🎥 Video Connect</h1>
    <div class="status-badge">
      {{ callStatus }}
    </div>
  </div>
  <div class="video-grid">
    <div class="video-wrapper">
      <video #localVideo autoplay muted playsinline></video>
      <div class="video-label">
        <div class="live-indicator"></div>
        <span>Camera của bạn</span>
      </div>
    </div>
    <div class="video-wrapper">
      <video #remoteVideo autoplay playsinline></video>
      <div class="video-label">
        <div class="live-indicator"></div>
        <span>Người tham gia</span>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-start" (click)="startCall()">
      <span>📞 Bắt đầu gọi</span>
    </button>
    <button class="btn-end" (click)="endCall()">
      <span>📵 Kết thúc gọi</span>
    </button>
    <button class="btn-camera" [class.off]="!cameraOn" (click)="toggleCamera()">
      <span>📹 {{ cameraOn ? 'Tắt camera' : 'Mở camera' }}</span>
    </button>
    <button class="btn-mic" [class.off]="!micOn" (click)="toggleMic()">
      <span>🎤 {{ micOn ? 'Tắt mic' : 'Mở mic' }}</span>
    </button>
  </div>
</div>
